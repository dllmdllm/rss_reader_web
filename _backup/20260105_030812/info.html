<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rss_reader_web 說明</title>
  <style>
    body {
      margin: 0;
      padding: 32px 20px;
      font-family: "Noto Sans TC", "PingFang TC", "Heiti TC", sans-serif;
      background: #f6f2ea;
      color: #1d1d1f;
      line-height: 1.8;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;

      background: #f5f5f5;
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
      font-family: "SFMono-Regular", "Consolas", "Menlo", monospace;
      font-size: 14px;

      color: #6a6a6a;
    }

<body>
  <main>
    <h1>rss_reader_web</h1>
    <div>來源：RTHK + Mingpao</div>
    <div>預設回看：12 小時</div>
    <div>預設更新：10 分鐘</div>
    <br>
    <div>用法</div>
    <pre>python3 generate_site.py</pre>
    <div class="muted">輸出：index.html</div>
    <br>
    <div>自動更新</div>
    <pre>./update_site.sh</pre>
    <div class="muted">如果資料夾已經是 git repo，腳本會自動 commit + push。</div>
